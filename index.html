<!DOCTYPE html>
<html>
<head>
  <title>JSON Example</title>
</head>
<body>

<h1>User List</h1>
<div id="output"></div>

<script>
fetch('data.json')
  .then(response => response.json())
  .then(data => {
    let output = '';
    data.forEach(user => {
      output += `<p>${user.name} - ${user.age}</p>`;
    });
    document.getElementById('output').innerHTML = output;
  })
  .catch(error => console.error('Error:', error));
</script>
<script src="script.js"></script>
</body>
</html>
