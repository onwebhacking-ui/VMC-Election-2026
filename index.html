<head>

    <title>VMC Election 2026 - Ward 10 Booth Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gov-blue: #003366; --gov-orange: #ff9933; }

        .search-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .booth-card { background: white; border-radius: 10px; border-left: 6px solid var(--gov-blue); padding: 20px; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .booth-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .area-list { font-size: 0.9rem; color: #555; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .btn-gov { background: var(--gov-blue); color: white; border: none; }

</head>
<body>

<header class="gov-header text-center">
    <h1>વડોદરા મહાનગરપાલિકા ચૂંટણી ૨૦૨૬</h1>

</header>

        <input type="text" id="searchInput" class="form-control form-control-lg mt-3" placeholder="દા.ત. ભાયલી, Solaris, 10/5, અક્ષર..." onkeyup="filterBooths()">
    </div>

    <div id="boothList" class="row">
        </div>
</div>

    {no: "9", name: "બ્રાઇટ ડે સ્કુલ", loc: "રૂમ નં.૧૦", areas: "સાઇનાથ સોસાયટી, નંદિશ્વર બંગ્લોઝ, સમન્વય વેફીલ્ડસ, ક્રિષ્ના મેરીડીન, ગ્રીન ફીલ્ડ-4"},

    // Note: Add remaining booths here in the same pattern
];

function filterBooths() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('boothList');
    list.innerHTML = "";

    const filtered = allBooths.filter(b => 
        b.areas.toLowerCase().includes(input) || b.no.includes(input) || b.name.toLowerCase().includes(input)
    );

    filtered.forEach(b => {
        list.innerHTML += `
            <div class="col-md-6 col-lg-4">
                <div class="booth-card">
                    <span class="badge bg-primary mb-2">બૂથ નં: ${b.no}</span>
                    <h5 class="mb-1">${b.name}</h5>
                    <p class="mb-2"><strong>સ્થળ:</strong> ${b.loc}</p>
                    <div class="area-list"><strong>વિસ્તાર:</strong> ${b.areas}</div>
                    <div class="mt-3 d-flex gap-2">
                        <a href="https://secsearch.gujarat.gov.in/search/default.aspx" target="_blank" class="btn btn-sm btn-gov">નામ શોધો (Voter Search)</a>
                    </div>
                </div>
            </div>`;
    });
}
filterBooths();
</script>
</body>
</html>
