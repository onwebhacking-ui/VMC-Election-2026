// ==== DISPLAY FUNCTION ====
function display(list) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = `<div class="no-result">કોઈ પરિણામ મળ્યું નથી</div>`;
        return;
    }

    list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="title">${item.booth_name}</div>
            <div class="info">📍 <b>લોકેશન:</b> ${item.location}</div>
            <div class="info">🏘️ <b>વિસ્તાર:</b> ${item.area}</div>
            <div class="info">👥 <b>મતદાર ક્રમ:</b> ${item.voter_range}</div>
            <div class="info">⚧ <b>જેન્ડર:</b> ${item.gender}</div>
        `;
        container.appendChild(card);
    });
}

// ==== SEARCH FUNCTION ====
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase().trim();

    const filtered = data.filter(item =>
        item.booth_name.toLowerCase().includes(value) ||
        item.location.toLowerCase().includes(value) ||
        item.area.toLowerCase().includes(value)
    );

    display(filtered);
});

// Initial Load
display(data);
</script>
