            padding: 25px;
            border-radius: 10px;

        }

            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--gov-blue);
        }

        /* Booth Card Style */

            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 6px solid var(--gov-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: none; /* Initially hidden */
        }

        .booth-card.visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .booth-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .booth-no {
            background: var(--gov-orange);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .booth-name {
            font-size: 19px;
            color: var(--gov-blue);
            font-weight: bold;
        }

        .info-row {
            margin: 8px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-row i {
            color: var(--gov-orange);
            margin-top: 4px;
            width: 20px;
        }

            margin-top: 10px;
            padding: 8px 15px;
            background: #e7f3ff;
            color: var(--gov-blue);
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #666;

        { "no": "75", "name": "જીવન શાંતિ વિદ્યાલય", "loc": "રૂમ નં. ૨, તાદલજા", "area": "કે.પી. લક્ષુરિયા, સાતત્ય રેસીડેન્સી, પ્રથમ ઉપવન, સન ક્રસ્ટ, સનરાઇઝ હાઈટ્સ" },

    ];

    const boothListDiv = document.getElementById('boothList');
    const searchInput = document.getElementById('searchInput');
    const boothCountDisplay = document.getElementById('boothCount');

    // Function to display booths
    function displayBooths(filter = "") {
        boothListDiv.innerHTML = "";
        let count = 0;

        allBooths.forEach(booth => {
            if (booth.name.includes(filter) || booth.area.includes(filter) || booth.no === filter || filter === "") {
                count++;
                const card = document.createElement('div');
                card.className = "booth-card visible";
                card.innerHTML = `
                    <div class="booth-header">
                        <span class="booth-name">${booth.name}</span>
                        <span class="booth-no">બૂથ નં: ${booth.no}</span>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <span><strong>સ્થળ:</strong> ${booth.loc}</span>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-users"></i>
                        <span><strong>વિસ્તાર:</strong> ${booth.area}</span>
                    </div>
                    <a href="https://www.google.com/maps/search/${encodeURIComponent(booth.name + ' ' + booth.loc)}" target="_blank" class="map-btn">
                        <i class="fas fa-directions"></i> મેપ પર જુઓ
                    </a>
                `;
                boothListDiv.appendChild(card);
            }
        });
        
        boothCountDisplay.innerText = filter === "" ? `કુલ ૭૯ મતદાન મથકો ઉપલબ્ધ છે` : `શોધાયેલા મથકો: ${count}`;
    }

    // Initial Display
    displayBooths();

    // Search Listener
    searchInput.addEventListener('input', (e) => {
        displayBooths(e.target.value);
    });
</script>
