    function loadTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = boothData.map(booth => `
            <tr>
                <td data-label="બૂથ નં."><span class="booth-no">${booth.no}</span></td>
                <td data-label="મથકનું નામ">
                    <strong>${booth.name}</strong><br>
                    <small style="color: #666;">${booth.loc}</small>
                </td>
                <td data-label="વિસ્તાર" class="area-text">${booth.area}</td>
                <td data-label="નકશો">
                    <a class="map-link" href="https://www.google.com/maps/search/${encodeURIComponent(booth.name + ' ' + booth.loc)}" target="_blank">
                        <i class="fas fa-location-dot"></i> Map
                    </a>
                </td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const input = document.getElementById('searchInput').value.toUpperCase();
        const tr = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            const text = tr[i].innerText.toUpperCase();
            tr[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(boothData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Polling Stations");
        XLSX.writeFile(wb, "VMC_Ward10_BoothList.xlsx");
    }

    window.onload = loadTable;
</script>
