<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>મતદાન મથક એડવાન્સ ડેશબોર્ડ</title>

<style>
body {
  font-family: "Noto Sans Gujarati", Arial;
  background: #f4f6f9;
  margin: 0;
}

header {
  background: #6f42c1;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  margin-bottom: 10px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #007bff;
  color: white;
}
</style>
</head>

<body>

<header>મતદાન મથક એડવાન્સ ડેટા</header>

<div class="container">

<input type="text" id="search" placeholder="🔍 શોધો (school / area / booth)...">

<button onclick="downloadCSV()">⬇ Excel Download</button>

<table>
<thead>
<tr>
  <th>પેજ</th>
  <th>બૂથ</th>
  <th>શાળા / સ્થાન</th>
  <th>વિસ્તાર / સોસાયટી</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>
let extractedData = [];

fetch('polling.json')
  .then(res => res.json())
  .then(data => {
    extractedData = processData(data.pages);
    render(extractedData);
  });

function processData(pages) {
  let rows = [];

  pages.forEach((page, index) => {

    let fullText = page.content.map(i => i.text).join(" ");

    // 🔍 Extract Booth Number
    let boothMatch = fullText.match(/મથક\s*રૂમ\.?\s*(\d+)/);
    let booth = boothMatch ? boothMatch[1] : "-";

    // 🏫 Extract School Name
    let schoolMatch = fullText.match(/(શાળા[^,]+)/);
    let school = schoolMatch ? schoolMatch[1] : "-";

    // 📍 Extract Area (basic guess)
    let areaMatch = fullText.match(/(ગામ[^.]+|વાડો[^.]+|સોસાયટી[^.]+)/);
    let area = areaMatch ? areaMatch[0] : "-";

    rows.push({
      page: index + 1,
      booth: booth,
      school: school,
      area: area,
      raw: fullText
    });

  });

  return rows;
}

function render(data) {
  let html = "";

  data.forEach(row => {
    html += `
    <tr>
      <td>${row.page}</td>
      <td>${row.booth}</td>
      <td>${row.school}</td>
      <td>${row.area}</td>
    </tr>`;
  });

  document.getElementById("tableBody").innerHTML = html;
}

// 🔍 Search
document.getElementById("search").addEventListener("input", function () {
  let val = this.value.toLowerCase();

  let filtered = extractedData.filter(row =>
    row.raw.toLowerCase().includes(val)
  );

  render(filtered);
});

// 📥 Export CSV
function downloadCSV() {
  let csv = "Page,Booth,School,Area\n";

  extractedData.forEach(r => {
    csv += `${r.page},${r.booth},"${r.school}","${r.area}"\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "polling_advanced.csv";
  a.click();
}
</script>

</body>
</html>
