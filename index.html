<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>મતદાન મથક ડેશબોર્ડ</title>

<style>
body {
  font-family: "Noto Sans Gujarati", Arial;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 20px;
}

#search {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  font-size: 16px;
}

.stats {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.stat-box {
  flex: 1;
  background: white;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.page-title {
  font-weight: bold;
  color: #007bff;
  margin-bottom: 10px;
}

.text-line {
  font-size: 14px;
  margin: 2px 0;
}
</style>
</head>

<body>

<header>મતદાન મથક માહિતી ડેશબોર્ડ</header>

<div class="container">

<input type="text" id="search" placeholder="🔍 શોધો...">

<div class="stats">
  <div class="stat-box">
    <div>કુલ પેજ</div>
    <div id="totalPages">0</div>
  </div>
  <div class="stat-box">
    <div>કુલ એન્ટ્રી</div>
    <div id="totalEntries">0</div>
  </div>
</div>

<div id="output">લોડ થઈ રહ્યું છે...</div>

</div>

<script>
let originalData = [];

fetch('polling.json')
  .then(res => res.json())
  .then(data => {
    originalData = data.pages;

    document.getElementById("totalPages").innerText = originalData.length;

    let totalEntries = 0;
    originalData.forEach(p => totalEntries += p.content.length);
    document.getElementById("totalEntries").innerText = totalEntries;

    render(originalData);
  })
  .catch(() => {
    document.getElementById("output").innerHTML =
      "<p style='color:red;'>ડેટા લોડ થયો નથી</p>";
  });

function render(pages) {
  let html = "";

  pages.forEach((page, index) => {

    html += `<div class="card">`;
    html += `<div class="page-title">📄 પેજ ${index + 1}</div>`;

    let combined = "";

    page.content.forEach(item => {
      if (item.text) {
        combined += item.text + " ";
      }
    });

    html += `<div class="text-line">${combined}</div>`;
    html += `</div>`;
  });

  document.getElementById("output").innerHTML = html;
}

// 🔍 Search
document.getElementById("search").addEventListener("input", function () {

  let value = this.value.toLowerCase();

  let filtered = originalData.filter(page => {
    return page.content.some(item =>
      item.text && item.text.toLowerCase().includes(value)
    );
  });

  render(filtered);
});
</script>

</body>
</html>
