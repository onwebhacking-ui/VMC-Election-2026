// ==== DISPLAY FUNCTION ====
function display(list) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = `<div class="no-result">🔎 કોઈ પરિણામ મળ્યું નથી. ફરી પ્રયાસ કરો.</div>`;
        return;
    }

    list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="title">${item.booth_name}</div>
            <div class="info"><span class="label">📍 લોકેશન:</span> ${item.location}</div>
            <div class="info"><span class="label">🏘️ વિસ્તાર:</span> ${item.area}</div>
            <div class="info"><span class="label">👥 મતદાન ક્રમ:</span> ${item.voter_range}</div>
            <div class="info"><span class="label">⚧ જેન્ડર:</span> ${item.gender}</div>
        `;
        container.appendChild(card);
    });
}

// ==== SEARCH FUNCTION ====
document.getElementById("search").addEventListener("input", function() {
    const query = this.value.toLowerCase().trim();

    const filtered = data.filter(item =>
        item.booth_name.toLowerCase().includes(query) ||
        item.location.toLowerCase().includes(query) ||
        item.area.toLowerCase().includes(query)
    );

    display(filtered);
});

// Initial Load
display(data);
</script>
