<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMC ચૂંટણી ૨૦૨૬ - મતદાન મથક વિગતો (વોર્ડ ૧૦)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --gov-blue: #003366;
            --gov-orange: #ff9933;
            --light-bg: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--gov-blue);
            color: white;
            padding: 25px 15px;
            text-align: center;
            border-bottom: 5px solid var(--gov-orange);
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Search & Action Bar */
        .action-bar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        #searchInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        #searchInput:focus { border-color: var(--gov-blue); }

        .btn-download {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Table Style */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--gov-blue);
            color: white;
            padding: 15px;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            line-height: 1.6;
        }

        tr:hover { background: #f9f9f9; }

        .booth-no {
            font-weight: bold;
            color: var(--gov-blue);
            background: #eef2f7;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .map-link {
            color: #d35400;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            th { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
            td { text-align: right; padding-left: 50%; position: relative; }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                font-weight: bold;
                text-align: left;
                color: var(--gov-blue);
            }
        }
    </style>
</head>
<body>

<header>
    <h1>વડોદરા મહાનગરપાલિકા ચૂંટણી ૨૦૨૬</h1>
    <p>વોર્ડ નંબર ૧૦ - મતદાન મથકોની અધિકૃત યાદી</p>
</header>

<div class="container">
    <div class="action-bar">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="બૂથ નંબર, શાળાનું નામ કે સોસાયટી શોધો...">
        <button class="btn-download" onclick="downloadExcel()">
            <i class="fas fa-file-excel"></i> Excel ડાઉનલોડ
        </button>
    </div>

    <div class="table-container">
        <table id="boothTable">
            <thead>
                <tr>
                    <th>બૂથ નં.</th>
                    <th>મતદાન મથકનું નામ અને સ્થળ</th>
                    <th>વિસ્તાર / સોસાયટીની વિગત</th>
                    <th>નકશો</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const boothData = [
        { no: "1", name: "ભાયલી કન્યા પ્રાથમિક શાળા, રૂમ નં-૧", loc: "ભાયલી ગામ, વડોદરા", area: "સોનીવાળી ખડકી, ગાંધીનગર દરવાજા, લાલદરવાજા, પટેલવાડી, શ્રીજી ચોક, સોલારીસ" },
        { no: "2", name: "ભાયલી કન્યા પ્રાથમિક શાળા, રૂમ નં-૨", loc: "ભાયલી ગામ, વડોદરા", area: "શ્રી હરિ રેસીડેન્સી, એવરેસ્ટ ટ્રાયકોન, અક્ષર એન્કલેવ, શરણમ રેસીડેન્સી, લેક વ્યુ" },
        { no: "4", name: "બ્રાઇટ ડે સ્કૂલ, રૂમ નં-૭", loc: "વાસણા-ભાયલી રોડ", area: "શુભમ વિસ્ટા, ધ ઓકવુડ, સ્પ્રિંગ કાઉન્ટી, દર્શનમ ઇનસિગ્નીયા, પ્લેટીનમ સ્કાય" },
        { no: "11", name: "ગાયત્રી વિદ્યાલય, રૂમ નં-૪", loc: "ગોત્રી, વડોદરા", area: "અમીતનગર, મહાવીર નગર, મહી નગર, ભેલ ટાઉનશીપ, મહાલક્ષ્મી નગર-૨" },
        { no: "15", name: "ન. પ્રા. શાળા નં ૨૧/૪૧, રૂમ નં-૧૧", loc: "ગોત્રી, વડોદરા", area: "જાનકી ડુપ્લેક્ષ, યશ કોમ્પલેક્ષ, સોનલ પાર્ક, અમરાવતી સોસાયટી" },
        { no: "38", name: "VMC વોર્ડ-૧૦ ઓફિસ", loc: "વાસણા-ભાયલી રોડ", area: "આશીર્વાદ કોમ્પલેક્ષ, કિશન ડુપ્લેક્ષ, સાઈનાથ રેસીડેન્સી, નીલામ્બર બંગ્લોઝ" },
        { no: "44", name: "ન. પ્રા. શાળા નં ૨૪/૪૯, રૂમ નં-૩", loc: "ગદાપુરા, ગોત્રી", area: "વેદાંત ડુપ્લેક્ષ, ફ્લોરેન્સ રીગાલીયા, પાર્શ્વનાથ સોસાયટી, સાનિધ્ય ફ્લેટ્સ" },
        { no: "52", name: "આત્મજ્યોતિ વિદ્યાલય, રૂમ નં-૪", loc: "તાદલજા, વડોદરા", area: "તૈયબી મહોલ્લો, ખુશબુનગર, રિઝવાન ફ્લેટ્સ, અમીનાનગર, અલ હાતીમ" },
        { no: "76", name: "ઇરા ઇન્ટરનેશનલ સ્કૂલ, રૂમ નં-૧", loc: "કેનાલ રોડ, ભાયલી", area: "સ્ટાર રેસીડેન્સી, ક્ષિતિજ ફ્લેટ, લાઈલેક રેસીડેન્સી, વેદાંત-૧, મોનાલીસા લેકવ્યુ" }
        // ... બાકીના ૭૬ સુધીના બૂથ અહીં ઉમેરી શકાય છે
    ];

    function loadTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = boothData.map(booth => `
            <tr>
                <td data-label="બૂથ નં."><span class="booth-no">${booth.no}</span></td>
                <td data-label="મથકનું નામ"><strong>${booth.name}</strong><br><small>${booth.loc}</small></td>
                <td data-label="વિસ્તાર">${booth.area}</td>
                <td data-label="નકશો"><a class="map-link" href="https://www.google.com/maps/search/${encodeURIComponent(booth.name + ' ' + booth.loc)}" target="_blank"><i class="fas fa-location-dot"></i> Map</a></td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const input = document.getElementById('searchInput').value.toUpperCase();
        const tr = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            tr[i].style.display = tr[i].innerText.toUpperCase().includes(input) ? "" : "none";
        }
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(boothData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Booths");
        XLSX.writeFile(wb, "VMC_Election_Ward10_Booths.xlsx");
    }

    window.onload = loadTable;
</script>

</body>
</html>
