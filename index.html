            text-align: center;
            background: #ffffff;

            border-radius: 50px;
            outline: none;

        }

            padding: 20px;

            border-top: 6px solid #e67e22;

        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

            background: #e67e22;
            color: white;
            padding: 2px 10px;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 18px;
        }

        .info {
            margin-top: 10px;
            font-size: 16px;
            line-height: 1.6;
            display: flex;
        }

        .label {
            font-weight: bold;
            color: #64748b;
            width: 130px;
            flex-shrink: 0;
        }

        .value {
            flex: 1;
        }

        .no-result {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
            font-size: 20px;
        }

    const resultsContainer = document.getElementById("results");
    const searchInput = document.getElementById("search");

    function display(list) {
        resultsContainer.innerHTML = "";

        if (list.length === 0) {
            resultsContainer.innerHTML = `<div class="no-result">🔎 કોઈ પરિણામ મળ્યું નથી.</div>`;
            return;
        }

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="title"><span class="booth-num">${item.id}</span> ${item.booth_name}</div>
                <div class="info"><span class="label">📍 લોકેશન:</span> <span class="value">${item.location}</span></div>
                <div class="info"><span class="label">🏘️ વિસ્તાર:</span> <span class="value">${item.area}</span></div>
                <div class="info"><span class="label">👥 મતદારો:</span> <span class="value">${item.voter_range}</span></div>
            `;
            resultsContainer.appendChild(card);
        });
    }

    searchInput.addEventListener("input", function() {
        const query = this.value.toLowerCase().trim();
        const filtered = boothData.filter(item => 
            item.booth_name.toLowerCase().includes(query) ||
            item.location.toLowerCase().includes(query) ||
            item.area.toLowerCase().includes(query) ||
            item.id.toString() === query
        );
        display(filtered);
    });

    display(boothData);
</script>
